<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Engine Portfolio Preview</title>
    
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; }
        
     
        .model-container {
            width: 80vw;
            height: 60vh;
            margin-top: 50px;
            background-color: #2a2a2a;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            outline: none;
        }

        .controls-hint { margin-top: 20px; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1></h1>

    <div class="model-container">
        
        <model-viewer 
            src="engine.glb" 
            alt="3D Engine Model" 
            auto-rotate 
            camera-controls 
            shadow-intensity="1" 
            exposure="1"
            environment-image="neutral"
            ar>
        </model-viewer>
    </div>

    

</body>
</html>
