<!DOCTYPE html>
<html>
<head>
    <title>Checking Version...</title>
</head>
<body>
    <script>
        // Change version number based on new version
        var latestVersion = 1.0; 

        
        var urlParams = new URLSearchParams(window.location.search);
        var appVersion = parseFloat(urlParams.get('v'));

        
        if (latestVersion > appVersion) {
            
            window.location.replace("kochu_update_available.html?latest=" + latestVersion);

        } else {
           
            window.location.href = "kochu://noupdate";
        }
    </script>
</body>
</html>
