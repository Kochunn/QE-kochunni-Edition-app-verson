<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Update Available - Kochunni Edition</title>

<style>
    :root {
        --discord-color: #5865F2;
        --discord-hover: #4752C4;
        --download-color: #23a559;
        --download-hover: #1e8f4c;
        --bg-color: #0d1117;
        --card-bg: rgba(255, 255, 255, 0.03);
        --card-border: rgba(255, 255, 255, 0.08);
        --text-main: #ffffff;
        --text-muted: #8b949e;
        --alert-red: #ff0000;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: radial-gradient(circle at top center, #1f2937 0%, var(--bg-color) 60%);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-main);
        overflow: hidden;

        -webkit-user-select: none;
        -ms-user-select: none;
        user-select: none;
    }

    .glow-circle {
        position: absolute;
        width: 300px;
        height: 300px;
        background: var(--download-color);
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.15;
        z-index: 0;
        top: -50px;
    }

    .container {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 40px 30px;
        width: 90%;
        max-width: 400px;
        background: var(--card-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--card-border);
        border-radius: 24px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        
        animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: translateY(20px);
    }

    @keyframes fadeUp {
        to { opacity: 1; transform: translateY(0); }
    }

    .logo {
        width: 96px;
        height: 96px;
        object-fit: contain;
        margin-bottom: 24px;
        border-radius: 20px;
        filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.4));
    }

    h1 {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 12px;
        letter-spacing: -0.5px;
    }

    p {
        color: var(--text-muted);
        font-size: 15px;
        line-height: 1.6;
        margin-bottom: 30px;
    }

    .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        gap: 12px;
        padding: 16px 24px;
        color: white;
        border-radius: 14px;
        text-decoration: none;
        font-size: 16px;
        font-weight: 600;
        transition: all 0.2s ease;
        margin-bottom: 12px;
        position: relative;
        overflow: hidden;
        z-index: 1; /* Keep text above the progress fill */

        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none; 
        -webkit-user-drag: none;     
    }

    .btn:active {
        transform: translateY(1px) scale(0.98);
    }

    .btn-icon {
        width: 22px;
        height: 22px;
        fill: currentColor;
    }

    /* Base Download Button */
    .download-btn {
        background: var(--download-color);
        box-shadow: 0 8px 20px rgba(35, 165, 89, 0.25);
    }

    .download-btn:hover {
        background: var(--download-hover);
        transform: translateY(-2px);
        box-shadow: 0 12px 24px rgba(35, 165, 89, 0.35);
    }

    /* --- THE PROGRESS BAR FILL --- */
    .download-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: var(--progress, 0%);
        background: rgba(0, 0, 0, 0.25); /* Darker overlay for the progress */
        z-index: -1;
        transition: width 0.15s ease-out; /* Smoothly animates the width */
    }

    .download-btn.success {
        background: #1f8042;
        pointer-events: none;
    }
    
    .download-btn.success::before {
        width: 100%;
        background: rgba(255, 255, 255, 0.1);
    }

    /* Spinning icon animation */
    .spin {
        animation: spin 1s linear infinite;
    }
    @keyframes spin {
        100% { transform: rotate(360deg); }
    }

    .discord-btn {
        background: var(--card-border);
        border: 1px solid rgba(255,255,255,0.1);
        margin-bottom: 0;
    }

    .discord-btn:hover {
        background: var(--discord-hover);
        border-color: var(--discord-hover);
        transform: translateY(-2px);
        box-shadow: 0 12px 24px rgba(88, 101, 242, 0.35);
    }

    @keyframes blinkAlert {
        0% { color: var(--text-muted); }
        50% { color: var(--alert-red); }
        100% { color: var(--text-muted); }
    }

    .blink-text {
        animation: blinkAlert 0.8s ease-in-out infinite;
        font-weight: 600;
    }
</style>
</head>

<script>
    // Version parameters
    var urlParams = new URLSearchParams(window.location.search);
    var newVersion = urlParams.get('latest');
    
    if (newVersion) {
        var formattedVersion = parseFloat(newVersion).toFixed(1);
        document.getElementById("dynamic-version").innerText = formattedVersion;
    } else {
        document.getElementById("dynamic-version").innerText = "Available";
    }

    // --- REALISTIC PROGRESS ANIMATION ---
    var downloadBtn = document.getElementById("download-btn");
    var btnText = document.getElementById("btn-text");
    var btnIcon = document.getElementById("btn-icon");
    var isDownloading = false;

    downloadBtn.addEventListener("click", function(e) {
      
        if (isDownloading) {
            e.preventDefault(); 
            return;
        }
        
        isDownloading = true;
       
        btnIcon.innerHTML = `<circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" stroke-dasharray="30" class="spin"></circle>`;
        
        let progress = 0;
        
      
        let progressInterval = setInterval(function() {

            let increment = Math.random() * 4 + 1; 
            

            if (progress > 85) {
                increment = Math.random() * 1.5 + 0.1; 
            }

            progress += increment;


            if (progress >= 100) {
                progress = 100;
                clearInterval(progressInterval);
                
                downloadBtn.classList.add("success");
                btnText.innerText = "Check Notifications!";
                

                btnIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>`;
                btnIcon.classList.remove("spin");
            } else {

                btnText.innerText = "Downloading... " + Math.floor(progress) + "%";
            }
            
            downloadBtn.style.setProperty('--progress', progress + '%');
            
        }, 120);
    });
</script>
